services:
  web:
    build: ./web
    container_name: web
    hostname: web
    ports:
      - "8080:80"
    volumes:
      - ./data:/data
    environment:
      - NODE_URLS=http://node1:5000,http://node2:5000,http://node3:5000
      - DB_PATH=/data/jobs.db
      - IMAGE_DIR=/data/images
      - DISPATCH_INTERVAL=5
      - MAX_RETRY=3
      - NODE_TIMEOUT_SEC=12
      - WEB_CALLBACK_URL=http://web:80
    depends_on:
      - node1
      - node2
      - node3
    networks:
      - cluster
    restart: unless-stopped

  node1:
    build: ./node
    container_name: node1
    hostname: node1
    environment:
      - NODE_ID=node1
      - WEB_CALLBACK_URL=http://web:80
    networks:
      - cluster
    restart: unless-stopped

  node2:
    build: ./node
    container_name: node2
    hostname: node2
    environment:
      - NODE_ID=node2
      - WEB_CALLBACK_URL=http://web:80
    networks:
      - cluster
    restart: unless-stopped

  node3:
    build: ./node
    container_name: node3
    hostname: node3
    environment:
      - NODE_ID=node3
      - WEB_CALLBACK_URL=http://web:80
    networks:
      - cluster
    restart: unless-stopped

networks:
  cluster:
    driver: bridge
