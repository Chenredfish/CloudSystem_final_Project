<VirtualHost *:80>
    ServerName localhost

    # mod_wsgi daemon process：2 個程序，各 5 個執行緒
    WSGIDaemonProcess webapp \
        processes=2 \
        threads=5 \
        python-path=/var/www/app \
        display-name=%{GROUP}
    WSGIProcessGroup webapp
    WSGIApplicationGroup %{GLOBAL}

    # 將 /api/* 路由到 Python WSGI 應用
    WSGIScriptAlias /api /var/www/app/wsgi.py

    <Directory /var/www/app>
        Require all granted
    </Directory>

    # 靜態前端檔案
    DocumentRoot /var/www/app/frontend

    <Directory /var/www/app/frontend>
        Require all granted
        Options -Indexes
        DirectoryIndex index.html
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
