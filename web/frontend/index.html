<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAPF 分散式計算服務</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1e293b;
      color: #f8fafc;
      padding: 0 20px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 16px; font-weight: 600; }
    .pulse-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    #last-poll {
      margin-left: auto;
      font-size: 11px;
      color: #64748b;
    }

    /* ── Main layout ── */
    main {
      display: flex;
      gap: 14px;
      padding: 14px;
      align-items: flex-start;
    }

    /* ── Shared panel ── */
    .panel {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.10);
    }
    .panel-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #94a3b8;
      padding: 10px 14px;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── Left column: editor ── */
    .editor-col {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Toolbar */
    .toolbar {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.10);
      padding: 10px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .vsep { width: 1px; height: 24px; background: #e2e8f0; flex-shrink: 0; }

    .tool-btn {
      padding: 5px 12px;
      border-radius: 5px;
      border: 2px solid #e2e8f0;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      background: #fff;
      transition: border-color .12s, background .12s, color .12s;
      user-select: none;
    }
    .tool-btn:hover { border-color: #cbd5e1; background: #f8fafc; }
    .tool-btn[data-tool="1"].active { background: #334155; color: #fff; border-color: #334155; }
    .tool-btn[data-tool="2"].active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    .tool-btn[data-tool="3"].active { background: #22c55e; color: #fff; border-color: #22c55e; }
    .tool-btn[data-tool="0"].active { background: #94a3b8; color: #fff; border-color: #94a3b8; }

    .legend {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .leg-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #64748b; }
    .leg-swatch {
      width: 12px; height: 12px; border-radius: 2px;
      border: 1px solid rgba(0,0,0,.12); flex-shrink: 0;
    }

    .act-btn {
      padding: 5px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .act-btn.ghost { background: #f1f5f9; color: #475569; }
    .act-btn.ghost:hover { background: #e2e8f0; }

    /* Canvas */
    .canvas-wrap { line-height: 0; }
    #grid-canvas {
      display: block;
      border-radius: 4px;
      border: 1px solid #cbd5e1;
      cursor: crosshair;
      touch-action: none;
    }

    /* Submit bar */
    .submit-bar {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.10);
      padding: 10px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .field {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .field label { font-size: 12px; color: #64748b; white-space: nowrap; }
    .field input[type="number"] {
      width: 60px;
      padding: 4px 6px;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      font-size: 12px;
      color: #1e293b;
    }
    .field input[type="number"]:focus { outline: 2px solid #3b82f6; border-color: transparent; }
    .btn-primary {
      padding: 6px 16px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    #submit-info { font-size: 11px; color: #94a3b8; }

    /* ── Right column ── */
    .info-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Nodes */
    .nodes-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px 14px;
    }
    .node-card {
      flex: 1;
      min-width: 130px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 10px 12px;
    }
    .node-head {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
    }
    .node-name { font-size: 13px; font-weight: 700; }
    .badge-status {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 999px;
    }
    .s-idle   { background: #dcfce7; color: #15803d; }
    .s-busy   { background: #fef9c3; color: #a16207; }
    .s-offline{ background: #fee2e2; color: #b91c1c; }
    .node-detail { font-size: 11px; color: #94a3b8; }
    .no-nodes { padding: 16px 14px; font-size: 13px; color: #94a3b8; }

    /* Jobs table */
    .jobs-wrap {
      overflow-x: auto;
      max-height: 420px;
      overflow-y: auto;
    }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th {
      text-align: left;
      padding: 8px 12px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #94a3b8;
      background: #f8fafc;
      position: sticky;
      top: 0;
      border-bottom: 1px solid #f1f5f9;
    }
    tbody td { padding: 8px 12px; border-bottom: 1px solid #f8fafc; vertical-align: middle; }
    tbody tr:hover td { background: #fafbfd; }
    .job-id { font-family: monospace; color: #64748b; }

    .badge-job {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .j-queued   { background: #f1f5f9; color: #64748b; }
    .j-running  { background: #dbeafe; color: #1d4ed8; }
    .j-done     { background: #dcfce7; color: #15803d; }
    .j-failed   { background: #fee2e2; color: #b91c1c; }
    .j-cancelled{ background: #f1f5f9; color: #94a3b8; }

    .gif-thumb {
      width: 36px; height: 36px;
      object-fit: cover;
      border-radius: 3px;
      border: 1px solid #e2e8f0;
      cursor: pointer;
    }
    .no-jobs { text-align: center; padding: 24px; color: #94a3b8; font-size: 13px; }

    .btn-xs {
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 600;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-cancel { background: #fee2e2; color: #b91c1c; }
    .btn-cancel:hover { background: #fecaca; }
    .btn-view   { background: #dbeafe; color: #1d4ed8; }
    .btn-view:hover { background: #bfdbfe; }

    /* ── Modal ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.6);
      z-index: 50;
      justify-content: center;
      align-items: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      max-width: 90vw;
      max-height: 90vh;
      overflow: auto;
      position: relative;
      min-width: 280px;
    }
    .modal-close {
      position: absolute;
      top: 10px; right: 14px;
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #94a3b8;
      line-height: 1;
    }
    .modal-close:hover { color: #1e293b; }
    .modal h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; padding-right: 24px; }
    #modal-gif {
      display: block;
      max-width: 100%;
      border-radius: 4px;
      border: 1px solid #e2e8f0;
    }
    .modal-stats {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .stat-card {
      background: #f8fafc;
      border-radius: 6px;
      padding: 8px 14px;
      min-width: 100px;
    }
    .stat-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
    .stat-val { font-size: 18px; font-weight: 700; }

    /* ── Toast ── */
    #toast-root { position: fixed; bottom: 18px; right: 18px; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      padding: 9px 14px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      background: #334155;
      box-shadow: 0 4px 12px rgba(0,0,0,.25);
      animation: slideIn .2s ease;
    }
    .toast.ok  { background: #16a34a; }
    .toast.err { background: #dc2626; }
    @keyframes slideIn { from{transform:translateX(60px);opacity:0} to{transform:none;opacity:1} }
  </style>
</head>
<body>

<header>
  <div class="pulse-dot"></div>
  <h1>MAPF 分散式計算服務</h1>
  <span id="last-poll"></span>
</header>

<main>
  <!-- ── LEFT: map editor ── -->
  <div class="editor-col">

    <!-- Toolbar -->
    <div class="toolbar">
      <button class="tool-btn active" data-tool="1" onclick="selectTool(1,this)">■ 牆壁</button>
      <button class="tool-btn"        data-tool="2" onclick="selectTool(2,this)">■ 貨架</button>
      <button class="tool-btn"        data-tool="3" onclick="selectTool(3,this)">■ 收銀台</button>
      <button class="tool-btn"        data-tool="0" onclick="selectTool(0,this)">◌ 清除</button>
      <div class="vsep"></div>
      <div class="legend">
        <div class="leg-item"><div class="leg-swatch" style="background:#e8e8e8"></div>走道</div>
        <div class="leg-item"><div class="leg-swatch" style="background:#334155"></div>牆</div>
        <div class="leg-item"><div class="leg-swatch" style="background:#3b82f6"></div>貨架</div>
        <div class="leg-item"><div class="leg-swatch" style="background:#22c55e"></div>收銀台</div>
      </div>
      <div class="vsep"></div>
      <button class="act-btn ghost" onclick="generatePreset()">生成範例地圖</button>
      <button class="act-btn ghost" onclick="clearGrid()">清除全部</button>
    </div>

    <!-- Canvas -->
    <div class="canvas-wrap panel">
      <canvas id="grid-canvas"></canvas>
    </div>

    <!-- Submit bar -->
    <div class="submit-bar">
      <div class="field">
        <label>顧客人數</label>
        <input type="number" id="f-agents"   value="20" min="1" max="60">
      </div>
      <div class="field">
        <label>清單長度</label>
        <input type="number" id="f-listsize" value="4"  min="1" max="10">
      </div>
      <div class="field">
        <label>最大步數</label>
        <input type="number" id="f-maxsteps" value="200" min="50" max="1000">
      </div>
      <div class="field">
        <label>隨機種子</label>
        <input type="number" id="f-seed"     value="42"  min="0">
      </div>
      <button class="btn-primary" id="submit-btn" onclick="submitJob()">提交任務</button>
      <span id="submit-info"></span>
    </div>

  </div><!-- /editor-col -->

  <!-- ── RIGHT: nodes + jobs ── -->
  <div class="info-col">

    <!-- Nodes -->
    <div class="panel">
      <div class="panel-title">計算節點</div>
      <div class="nodes-grid" id="nodes-root">
        <div class="no-nodes">等待節點連線…</div>
      </div>
    </div>

    <!-- Jobs -->
    <div class="panel">
      <div class="panel-title">
        任務佇列
        <span id="jobs-count" style="font-weight:400"></span>
      </div>
      <div class="jobs-wrap">
        <table>
          <thead>
            <tr>
              <th>任務 ID</th>
              <th>狀態</th>
              <th>提交時間</th>
              <th>節點</th>
              <th>耗時</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="jobs-root">
            <tr><td colspan="6" class="no-jobs">尚無任務</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div><!-- /info-col -->
</main>

<!-- ── GIF Modal ── -->
<div class="overlay" id="modal-overlay" onclick="onOverlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h2 id="modal-title">任務結果</h2>
    <img id="modal-gif" src="" alt="MAPF 動畫">
    <div class="modal-stats" id="modal-stats"></div>
  </div>
</div>

<!-- ── Toast root ── -->
<div id="toast-root"></div>

<script src="app.js"></script>
</body>
</html>
